<div class="section-card education">
  <div class="title-section">
    <div class="line">
    </div>
    <h1>Education</h1>
  </div>

  {{ range  .Education }}
  <div class="columns" style="margin-bottom: 0.25rem;">
    <div class="column is-three-quarters">
      <h2 class="edu-uni">{{ .University }}</h2>
      {{ if .Marks }} 
      <h3 class="edu-course">{{ .Course }} - {{ .Marks }}</h3>
      {{ else }}
      <h3 class="edu-course">{{ .Course }}</h3>
      {{ end }}
    </div>
    <div class="column has-text-right">
      <h2 class="edu-location">{{ .Location }}</h2>
      <h3 class="edu-year">{{ .Year }}</h3>
    </div>
  </div>
  {{ end }}
</div>
